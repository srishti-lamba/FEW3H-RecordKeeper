<svg width="520" height="40" viewBox="0 0 520 40" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Properly centered Triangle pattern -->
    <pattern id="trianglePattern"
             patternUnits="userSpaceOnUse"
             width="20"
             height="10"
             patternTransform="translate(0,-5)">
      
      <!-- Triangle centered within tile -->
      <polygon points="0,8 10,2 20,8" fill="black"/>

      <!-- Horizontal animation -->
      <animateTransform
        attributeName="patternTransform"
        type="translate"
        from="0,-5"
        to="20,-5"
        dur="2s"
        repeatCount="indefinite" />
    </pattern>

    <!-- Arrow marker -->
    <marker id="arrow"
            viewBox="0 0 10 10"
            refX="10"
            refY="5"
            markerWidth="6"
            markerHeight="6"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <!-- Line -->
  <line x1="10" y1="20" x2="510" y2="20"
        stroke="url(#trianglePattern)"
        stroke-width="10"
        vector-effect="non-scaling-stroke"
        marker-end="url(#arrow)" />

</svg>