<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 10 10"
    preserveAspectRatio="xMidYMid meet"
>
    <defs>
        <path
            id="corner"
            d=" M 0 0 
                L 1 0 
                L 0 1 
                Z"
            fill="rgb(102,91,63)"
        />
        <filter id="f1" x="0" y="0" xmlns="http://www.w3.org/2000/svg">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
        </filter>
    </defs>

    <!-- Shadows -->
    <rect 
        x="0" y="0"
        height="100%" width="100%"
        fill="none"
        stroke="rgb(30, 30, 30)" stroke-width="10" vector-effect="non-scaling-stroke"
        filter="url(#f1)"
    />

    <!-- Border -->
    <rect 
        x="0" y="0"
        height="100%" width="100%"
        fill="none"
        stroke="rgb(102,91,63)" stroke-width="2" vector-effect="non-scaling-stroke"
    />

    <!-- Corners -->
    <use href="#corner" />
    <use href="#corner" transform="scale(-1,1) translate(-10,0)" />
    <use href="#corner" transform="scale(1,-1) translate(0,-10)" />
    <use href="#corner" transform="scale(-1,-1) translate(-10,-10)" />

</svg>